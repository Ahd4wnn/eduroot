<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Completed</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <span style="font-size:22px;font-weight:700;color:#0F3D2E;">
                🌱 eduroot
              </span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#0F3D2E;border-radius:16px;padding:40px 36px;">

              <!-- Trophy -->
              <div style="text-align:center;font-size:48px;
                          margin-bottom:20px;">
                🏆
              </div>

              <h1 style="font-size:24px;font-weight:700;color:#ffffff;
                         text-align:center;margin:0 0 12px;line-height:1.2;">
                Course complete!
              </h1>

              <p style="font-size:15px;color:rgba(255,255,255,0.7);
                        line-height:1.6;margin:0 0 28px;text-align:center;">
                Hi {{ student_name }}, you've officially completed<br/>
                <strong style="color:#C8A96B;">{{ course_title }}</strong>.
                That's a big deal.
              </p>

              <!-- XP earned -->
              <div style="background:rgba(255,255,255,0.1);border-radius:12px;
                          padding:16px 20px;text-align:center;margin-bottom:28px;
                          border:1px solid rgba(200,169,107,0.3);">
                <p style="font-size:12px;color:rgba(255,255,255,0.5);
                           text-transform:uppercase;letter-spacing:0.1em;
                           margin:0 0 6px;">
                  Your total XP
                </p>
                <p style="font-size:28px;font-weight:700;color:#C8A96B;margin:0;">
                  ⚡ {{ total_xp }} XP
                </p>
              </div>

              <!-- CTA -->
              <div style="text-align:center;">
                <a href="{{ dashboard_url }}"
                   style="display:inline-block;background:#C8A96B;
                          color:#0F3D2E;font-size:15px;font-weight:700;
                          text-decoration:none;padding:14px 36px;
                          border-radius:12px;">
                  View my progress
                </a>
              </div>

              <p style="font-size:12px;color:rgba(255,255,255,0.4);
                        text-align:center;margin:24px 0 0;">
                Your certificate will be sent to you shortly by the eduroot team.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="font-size:11px;color:#c0c4c8;margin:0;">
                eduroot.online · Learn skills that get you hired
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
